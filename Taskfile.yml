version: '3'

tasks:
  verify:
    desc: Run Go vet (lenient on pre-existing unsafe.Pointer noise in test files), build, and tests under -race.
    cmds:
      # unsafeptr=false suppresses the pervasive unsafe.Pointer arithmetic in
      # test scaffolding that mirrors the production SHM layout — pre-existing
      # pattern across ~25 test files, not a regression. Tracking cleanup
      # (migrate to unsafe.Add) is on the Known Improvement Backlog.
      - go vet -unsafeptr=false ./go/...
      - go build ./go/...
      - go test -race -count=1 -timeout=60s ./go/...

  benchmark:
    desc: Run performance benchmarks against the Go guest.
    cmds:
      - go test -run=NONE -bench=. -benchmem -count=1 -timeout=300s ./go/...
